name: oci_publish

on:
  push:
    branches: [develop, main]
    tags:
      - 'v*'

jobs:
  release:
    uses: eoap/eoap-cwl-release-workflow/.github/workflows/release-cwl.yml@main
    with:
      tools: '["osc-metadata-client"]'
      image-prefix: terradue/osc-metadata-client
      registry: ghcr.io
      cwl-workflow-dir: cwl-workflow
      cwl-tool-dir: command-line-tools
      entrypoint: publish_workflow
    secrets:
      registry-user: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
